<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VOIX — coach vocal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#181020;
    --bg2:#241634;
    --surface:rgba(255,255,255,.045);
    --surface-2:rgba(255,255,255,.07);
    --border:rgba(255,255,255,.10);
    --ink:#F4EEE6;
    --muted:#A99FB4;
    --muted-2:#7E7488;
    --accent:#D99A5B;            /* overridden per week */
    --accent-ink:#1a1208;
    --track:rgba(255,255,255,.09);
    --radius:18px;
    --shadow:0 18px 50px -20px rgba(0,0,0,.7);
    --display:"Fraunces",Georgia,"Times New Roman",serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #2c1a40 0%, rgba(44,26,64,0) 55%),
      radial-gradient(90% 60% at 90% 110%, rgba(217,154,91,.10) 0%, rgba(0,0,0,0) 60%),
      linear-gradient(180deg,var(--bg) 0%, #120b1a 100%);
    background-attachment:fixed;
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  #app{
    max-width:480px;margin:0 auto;min-height:100%;
    padding:max(18px,env(safe-area-inset-top)) 18px max(22px,env(safe-area-inset-bottom));
    display:flex;flex-direction:column;
  }
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
  button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:6px}

  /* ---------- shared bits ---------- */
  .wordmark{font-family:var(--display);font-weight:800;letter-spacing:.14em;font-size:1.45rem}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
  .tagline{color:var(--muted);font-size:.86rem;letter-spacing:.02em}
  .ghost-btn{
    display:inline-flex;align-items:center;gap:7px;padding:9px 13px;border-radius:999px;
    background:var(--surface);border:1px solid var(--border);color:var(--ink);
    font-size:.82rem;font-weight:600;transition:background .18s,transform .1s;
  }
  .ghost-btn:active{transform:scale(.96)}
  .ghost-btn:hover{background:var(--surface-2)}
  .eyebrow{font-size:.72rem;text-transform:uppercase;letter-spacing:.22em;color:var(--muted-2);font-weight:700;margin:22px 0 11px}

  /* ---------- home ---------- */
  .weeks{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .week{
    text-align:left;border-radius:var(--radius);padding:14px 12px 13px;
    background:var(--surface);border:1px solid var(--border);
    transition:border-color .18s,background .18s,transform .1s;position:relative;overflow:hidden;
  }
  .week:active{transform:scale(.97)}
  .week .wk{font-family:var(--mono);font-size:.74rem;color:var(--muted);letter-spacing:.05em}
  .week .nm{font-family:var(--display);font-weight:600;font-size:1.06rem;margin-top:3px;line-height:1.1}
  .week.sel{border-color:var(--accent);background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.03))}
  .week.sel::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:var(--accent)}

  .obj{margin-top:11px;color:var(--muted);font-size:.9rem;min-height:1.2em}

  .days{display:flex;gap:8px;flex-wrap:wrap}
  .day{
    width:42px;height:46px;border-radius:13px;background:var(--surface);border:1px solid var(--border);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
    font-weight:700;font-size:1rem;transition:transform .1s,border-color .18s,background .18s;position:relative;
  }
  .day:active{transform:scale(.92)}
  .day small{font-size:.6rem;line-height:1}
  .day .mark{font-size:.62rem;position:absolute;top:4px;right:5px}
  .day.sel{border-color:var(--accent);background:var(--accent);color:var(--accent-ink)}
  .day.rest .mark{opacity:.7}

  .consigne{
    margin-top:14px;border-radius:var(--radius);padding:14px 15px;
    background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);
  }
  .consigne .lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.18em;color:var(--muted-2);font-weight:700}
  .consigne .txt{margin-top:5px;font-size:.97rem}
  .rec-tag{display:inline-flex;align-items:center;gap:6px;margin-top:9px;font-size:.78rem;color:var(--accent);font-weight:700}

  .spacer{flex:1;min-height:18px}
  .meta-line{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.82rem;margin:16px 2px 10px;font-family:var(--mono)}
  .today-done{color:#86d6a0;font-weight:700}

  .cta{
    width:100%;padding:17px;border-radius:16px;background:var(--accent);color:var(--accent-ink);
    font-weight:800;font-size:1.04rem;letter-spacing:.01em;box-shadow:var(--shadow);
    transition:transform .1s,filter .18s;
  }
  .cta:active{transform:scale(.98)}
  .cta:hover{filter:brightness(1.05)}
  .cta-2{
    width:100%;margin-top:10px;padding:14px;border-radius:14px;background:var(--surface);
    border:1px solid var(--border);color:var(--ink);font-weight:700;font-size:.92rem;
    display:flex;align-items:center;justify-content:center;gap:8px;transition:background .18s,transform .1s;
  }
  .cta-2:active{transform:scale(.98)}
  .cta-2:hover{background:var(--surface-2)}

  /* ---------- session ---------- */
  .sess-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}
  .sess-label{font-family:var(--mono);font-size:.82rem;color:var(--muted);letter-spacing:.04em}
  .sess-total{font-family:var(--mono);font-size:.82rem;color:var(--ink)}
  .sess-total b{color:var(--accent)}

  .sess-consigne{
    margin:10px 0 4px;border-radius:14px;padding:11px 13px;background:var(--surface);
    border:1px solid var(--border);border-left:3px solid var(--accent);font-size:.87rem;color:var(--ink)
  }
  .sess-consigne .r{color:var(--accent);font-weight:700}

  .ring-wrap{display:flex;justify-content:center;margin:12px 0 4px}
  .ring{position:relative;width:248px;max-width:72vw;aspect-ratio:1;animation:breathe 5s ease-in-out infinite}
  .reduce .ring{animation:none}
  .ring.paused{animation-play-state:paused}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.018)}}
  .ring svg{width:100%;height:100%;transform:rotate(-90deg);overflow:visible}
  .ring .bg-c{fill:none;stroke:var(--track);stroke-width:9}
  .ring .fg-c{fill:none;stroke:var(--pc,var(--accent));stroke-width:9;stroke-linecap:round;
    filter:drop-shadow(0 0 9px color-mix(in srgb,var(--pc,var(--accent)) 60%,transparent));
    transition:stroke-dashoffset .25s linear,stroke .25s ease}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .time{font-family:var(--mono);font-size:3.5rem;font-weight:600;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
  .step-count{font-family:var(--mono);font-size:.78rem;color:var(--muted);margin-top:7px;letter-spacing:.08em}

  .step-title{font-family:var(--display);font-weight:600;font-size:1.5rem;text-align:center;margin:10px 6px 2px;line-height:1.15}
  .cues{list-style:none;padding:0;margin:10px auto 0;max-width:360px;display:flex;flex-direction:column;gap:8px}
  .cues li{position:relative;padding-left:20px;color:#e7dfe9;font-size:.97rem}
  .cues li::before{content:"";position:absolute;left:3px;top:.62em;width:7px;height:7px;border-radius:50%;
    background:var(--accent);opacity:.85}
  .tip{margin:10px auto 0;max-width:360px;font-size:.85rem;color:var(--muted);font-style:italic;text-align:center}

  .segs{display:flex;gap:5px;margin:2px 0 12px}
  .seg{flex:1;height:5px;border-radius:3px;background:var(--track);overflow:hidden;position:relative}
  .seg.done{background:var(--accent)}
  .seg.cur::after{content:"";position:absolute;inset:0;width:var(--p,0%);background:var(--accent);transition:width .25s linear}

  .sess-foot{margin-top:auto;position:sticky;bottom:0;z-index:5;padding-top:12px;
    background:linear-gradient(180deg,rgba(18,11,26,0) 0%,var(--bg) 36%)}
  .controls{display:flex;align-items:center;justify-content:center;gap:14px}
  .ctrl{
    width:58px;height:58px;border-radius:50%;background:var(--surface);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;transition:transform .1s,background .18s;
  }
  .ctrl:active{transform:scale(.9)}
  .ctrl:hover{background:var(--surface-2)}
  .ctrl svg{width:22px;height:22px;fill:var(--ink)}
  .ctrl.play{width:74px;height:74px;background:var(--accent);border:none}
  .ctrl.play svg{width:30px;height:30px;fill:var(--accent-ink)}
  .subctrl{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px;flex-wrap:wrap}
  .pill{
    display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:999px;background:var(--surface);
    border:1px solid var(--border);font-size:.8rem;font-weight:600;color:var(--muted);transition:background .18s,transform .1s
  }
  .pill:active{transform:scale(.95)}
  .pill svg{width:15px;height:15px;fill:currentColor}
  .pill.on{color:var(--accent)}

  /* ---------- end / log ---------- */
  .done-h{font-family:var(--display);font-weight:800;font-size:2rem;text-align:center;margin:30px 0 4px}
  .done-sub{text-align:center;color:var(--muted);font-family:var(--mono);font-size:.85rem;margin-bottom:6px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-top:16px}
  .field{margin-top:16px}
  .field:first-child{margin-top:0}
  .field label{display:block;font-size:.82rem;color:var(--muted);font-weight:600;margin-bottom:8px}
  .field .hint{color:var(--muted-2);font-weight:400}
  .num-row{display:flex;align-items:center;gap:12px}
  .stepper{width:46px;height:46px;border-radius:12px;background:var(--surface-2);border:1px solid var(--border);
    font-size:1.4rem;display:flex;align-items:center;justify-content:center;font-weight:700}
  .stepper:active{transform:scale(.92)}
  .num-val{font-family:var(--mono);font-size:1.7rem;font-weight:600;min-width:64px;text-align:center;
    font-variant-numeric:tabular-nums}
  .num-unit{color:var(--muted);font-size:.9rem}
  .stars{display:flex;gap:8px}
  .star{width:46px;height:46px;border-radius:12px;background:var(--surface-2);border:1px solid var(--border);
    font-size:1.2rem;font-weight:700;color:var(--muted);transition:transform .1s}
  .star:active{transform:scale(.9)}
  .star.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  textarea{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;color:var(--ink);
    font-family:inherit;font-size:.95rem;padding:11px 12px;resize:vertical;min-height:64px}
  textarea::placeholder{color:var(--muted-2)}

  /* ---------- progress ---------- */
  .stat-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .stat{flex:1 1 70px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 10px}
  .stat .v{font-family:var(--mono);font-size:1.6rem;font-weight:600}
  .stat .k{color:var(--muted);font-size:.76rem;margin-top:2px}
  .chart-card{margin-top:14px}
  .chart-card h3{font-size:.82rem;color:var(--muted);font-weight:600;margin:0 0 10px;letter-spacing:.02em}
  .chart{width:100%;height:120px;display:block}
  .empty{color:var(--muted-2);font-size:.88rem;text-align:center;padding:18px 6px}
  .hist{list-style:none;padding:0;margin:8px 0 0}
  .hist li{display:flex;align-items:center;gap:10px;padding:11px 2px;border-top:1px solid var(--border);font-size:.88rem}
  .hist li:first-child{border-top:none}
  .hist .d{font-family:var(--mono);color:var(--muted);width:52px;flex:none}
  .hist .sj{font-weight:700;width:54px;flex:none}
  .hist .ss{font-family:var(--mono);color:var(--accent);width:42px;flex:none;text-align:right}
  .hist .se{color:var(--muted);margin-left:auto;letter-spacing:1px}

  .fade{animation:fade .28s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .reduce .fade{animation:none}

  /* phase de lecture (prep) */
  .ring.prep{animation:none}
  .ring.prep .fg-c{stroke:var(--muted);filter:none;opacity:.6}
  .ring.prep .time{color:var(--muted)}
  .hint{margin:9px auto 0;max-width:340px;text-align:center;color:var(--accent);font-size:.84rem;font-weight:600;line-height:1.35}

  /* sélecteur du délai de lecture (accueil) */
  .prep-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:16px 2px 0}
  .prep-lbl{color:var(--muted);font-size:.84rem}
  .prep-opts{display:flex;gap:6px}
  .prep-opts button{padding:8px 13px;border-radius:999px;background:var(--surface);border:1px solid var(--border);
    font-size:.82rem;font-weight:700;color:var(--muted);transition:background .15s,transform .1s}
  .prep-opts button:active{transform:scale(.93)}
  .prep-opts button.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}

  /* ---------- panneau Outils ---------- */
  .tools-trigger.on{color:var(--accent)!important;border-color:var(--accent)!important}
  .tools-backdrop{position:fixed;inset:0;background:rgba(8,4,14,.55);opacity:0;pointer-events:none;
    transition:opacity .25s;z-index:40}
  .tools-backdrop.open{opacity:1;pointer-events:auto}
  .tools-panel{position:fixed;left:0;right:0;bottom:0;z-index:41;width:100%;max-width:480px;margin:0 auto;
    background:linear-gradient(180deg,#281a3a,#1a1024);border:1px solid var(--border);border-bottom:none;
    border-radius:24px 24px 0 0;box-shadow:0 -22px 60px -18px rgba(0,0,0,.8);
    padding:16px 18px max(20px,env(safe-area-inset-bottom));
    transform:translateY(112%);transition:transform .3s cubic-bezier(.2,.85,.25,1)}
  .tools-panel.open{transform:none}
  .reduce .tools-panel{transition:none}
  .tools-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .tools-head h2{font-family:var(--display);font-weight:700;font-size:1.25rem;margin:0}
  .tools-x{width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--border);
    color:var(--ink);font-size:1rem;display:flex;align-items:center;justify-content:center}
  .tool{border-top:1px solid var(--border);padding:14px 0 4px}
  .tool:first-of-type{border-top:none}
  .tool-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .tool-name{display:flex;align-items:center;gap:9px;font-weight:700;font-size:1rem}
  .tool-name .em{font-size:1.15rem}
  .sw{width:50px;height:30px;border-radius:999px;background:var(--track);border:1px solid var(--border);
    position:relative;flex:none;transition:background .2s}
  .sw::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;
    background:#cfc6d6;transition:transform .2s,background .2s}
  .sw.on{background:var(--accent)}
  .sw.on::after{transform:translateX(20px);background:var(--accent-ink)}
  .tool-body{margin-top:12px}
  .row-ctrl{display:flex;align-items:center;justify-content:center;gap:14px}
  .vol-row{display:flex;align-items:center;gap:10px;margin-top:14px}
  .vol-ic{font-size:.95rem;opacity:.8}
  .vol-row input[type=range]{flex:1;height:24px;accent-color:var(--accent);background:transparent}
  .rbtn{width:46px;height:46px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);
    color:var(--ink);font-size:1.4rem;font-weight:700;display:flex;align-items:center;justify-content:center}
  .rbtn:active{transform:scale(.92)}
  .rval{font-family:var(--mono);font-size:1.5rem;font-weight:600;min-width:140px;text-align:center;font-variant-numeric:tabular-nums}
  .rval small{display:block;font-family:var(--sans);font-size:.7rem;color:var(--muted);font-weight:400;margin-top:3px}
  .tap{padding:0 16px;height:46px;border-radius:13px;background:var(--surface);border:1px solid var(--border);
    color:var(--muted);font-weight:700;font-size:.82rem}
  .tap:active{transform:scale(.95)}
  .beats{display:flex;gap:9px;justify-content:center;margin-top:13px}
  .beat{width:12px;height:12px;border-radius:50%;background:var(--track);transition:transform .05s,background .05s}
  .beat.hit{background:var(--accent);transform:scale(1.4)}
  .beat.acc.hit{background:#fff}
  /* barre du modèle joué (play-along) */
  .model-play{padding:11px 18px;border-radius:999px;background:var(--accent);color:var(--accent-ink);
    font-weight:700;font-size:.88rem;transition:transform .1s,filter .15s}
  .model-play:active{transform:scale(.96)}
  .model-play.playing{filter:brightness(1.15);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 30%,transparent)}
  .model-tr{display:flex;align-items:center;gap:8px}
  .rbtn.sm{width:38px;height:38px;font-size:1.2rem;border-radius:11px}
  .model-root{font-family:var(--mono);font-weight:600;min-width:50px;text-align:center;color:var(--ink);font-size:.95rem}

  /* PHASES : bannière (écoute / à toi / fais) + instruction + contrôles */
  .phase-banner{margin:12px auto 0;max-width:340px;text-align:center;font-family:var(--mono);font-weight:700;
    font-size:.92rem;letter-spacing:.04em;padding:8px 14px;border:1.5px solid var(--border);border-radius:999px;
    color:var(--muted);transition:color .2s ease,border-color .2s ease}
  .phase-instr{margin:10px auto 0;max-width:360px;text-align:center;color:var(--ink);font-size:1rem;line-height:1.4;font-weight:500}
  .phase-ctrl{display:flex;align-items:center;justify-content:center;gap:12px;margin:14px auto 0;max-width:400px;flex-wrap:wrap}
  .drone-pill{font-weight:700}
  .drone-pill.on{background:var(--accent);color:var(--accent-ink);border-color:transparent}

  /* « Comment faire ? » */
  .how-btn{display:block;margin:10px auto 0;padding:7px 15px;border-radius:999px;background:var(--surface);
    border:1px solid var(--border);color:var(--accent);font-weight:700;font-size:.82rem;transition:background .15s,transform .1s}
  .how-btn:active{transform:scale(.96)}
  .how-btn:hover{background:var(--surface-2)}
  .how-back{position:fixed;inset:0;background:rgba(8,4,14,.62);opacity:0;pointer-events:none;transition:opacity .2s;
    z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
  .how-back.open{opacity:1;pointer-events:auto}
  .how-card{width:100%;max-width:420px;max-height:80vh;overflow:auto;
    background:linear-gradient(180deg,#281a3a,#1a1024);border:1px solid var(--border);border-radius:20px;
    box-shadow:var(--shadow);padding:20px;transform:translateY(14px) scale(.98);transition:transform .22s}
  .how-back.open .how-card{transform:none}
  .reduce .how-back,.reduce .how-card{transition:none}
  .how-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:4px}
  .how-title{font-family:var(--display);font-weight:700;font-size:1.25rem;margin:0;line-height:1.2}
  .how-body p{color:#e7dfe9;font-size:.95rem;margin:11px 0;line-height:1.55}
  .how-body p:first-child{margin-top:6px}
  .how-body p.lead{color:var(--accent);font-weight:600}


  /* objectif de souffle + célébration */
  .goal-row{display:flex;align-items:center;justify-content:space-between;margin-top:13px;color:var(--muted);font-size:.85rem}
  .goal-ctrl{display:flex;align-items:center;gap:8px}
  .goal-ctrl button{width:32px;height:32px;border-radius:9px;background:var(--surface-2);border:1px solid var(--border);
    color:var(--ink);font-size:1.1rem;font-weight:700;display:flex;align-items:center;justify-content:center}
  .goal-ctrl button:active{transform:scale(.92)}
  .goal-ctrl span{font-family:var(--mono);font-weight:600;color:var(--ink);min-width:44px;text-align:center}
  .celebrate{margin:12px 0 0;padding:13px 15px;border-radius:14px;
    background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 24%,transparent),transparent);
    border:1px solid var(--accent);color:var(--ink);font-weight:700;text-align:center;animation:pop .42s cubic-bezier(.2,1.4,.4,1)}

/* =========================================================
   STOCKAGE (window.storage prioritaire, repli mémoire)
   ========================================================= */
const _mem = {};
const Store = {
  async get(k){
    try{ if(window.storage&&window.storage.get){ const r=await window.storage.get(k); return r?r.value:null; } }catch(e){}
    return (k in _mem)?_mem[k]:null;
  },
  async set(k,v){
    try{ if(window.storage&&window.storage.set){ await window.storage.set(k,v); _mem[k]=v; return; } }catch(e){}
    _mem[k]=v;
  },
  async getJSON(k,fb){ const v=await this.get(k); if(v==null) return fb; try{return JSON.parse(v);}catch(e){return fb;} },
  async setJSON(k,o){ await this.set(k,JSON.stringify(o)); },
};

/* =========================================================

   ========================================================= */
let AC=null;
function audio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; } } if(AC&&AC.state==="suspended") AC.resume(); return AC; }
function tone(freq,start,dur,gain){
  const c=audio(); if(!c||S.muted) return;
  const o=c.createOscillator(), g=c.createGain();
  o.type="sine"; o.frequency.value=freq;
  o.connect(g); g.connect(c.destination);
  const t=c.currentTime+start;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(gain,t+.02);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.start(t); o.stop(t+dur+.02);
}
function beepNext(){ tone(660,0,.16,.2); tone(880,.12,.18,.18); }   // fin d'étape
function chimeEnd(){ tone(523.25,0,.5,.2); tone(659.25,.16,.5,.2); tone(783.99,.32,.7,.22); } // do-mi-sol

async function lockScreen(){ try{ if("wakeLock" in navigator){ wakeLock=await navigator.wakeLock.request("screen"); } }catch(e){} }
function unlockScreen(){ try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){} }
document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible" && S.screen==="session" && S.running) lockScreen(); });

function announce(t){ ann.textContent=""; setTimeout(()=>ann.textContent=t,40); }

let curAccent="#D99A5B";
function setAccent(hex,ink){
  curAccent=hex;
  document.documentElement.style.setProperty("--accent",hex);
  document.documentElement.style.setProperty("--accent-ink",ink||"#1a1208");
}
function fmt(ms){ const s=Math.max(0,Math.round(ms/1000)); const m=Math.floor(s/60); return m+":"+String(s%60).padStart(2,"0"); }
function sessTotalMs(){
  let t=(S.phase==="prep")?(S.prepMs+S.remMs):S.remMs;
  for(let j=S.pidx+1;j<S.phases.length;j++) t+=S.phases[j].sec*1000;
  for(let i=S.idx+1;i<S.steps.length;i++) t+=S.prepSecs*1000+exDurMs(S.steps[i]);
  return t;
}
function esc(x){ return String(x).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }

/* =========================================================
   ÉCRAN — ACCUEIL

function todayKey(){ const d=new Date(); return d.toISOString().slice(0,10); }
function hasTodayLog(){ return S.logs.some(l=>l.date===todayKey()); }

/* =========================================================
   SESSION — moteur + écran
   ========================================================= */
function startSession(mode){
  audio(); // débloque l'audio sur le geste utilisateur
  S.mode=mode;
  const src = mode==="off" ? OFF : WEEKS[S.week];
  setAccent(src.accent,src.ink);
  S.steps=src.steps; S.running=true; S.screen="session";
  S.idx=0; S.tr=0; S.phases=buildPhases(S.steps[0]); S.pidx=0;
  S.phase="prep"; S.prepMs=S.prepSecs*1000; S.remMs=S.phases[0].sec*1000;
  S.endAt=Date.now()+S.prepMs;
  renderSession();
  lockScreen();
  startTick();
  announce("Exercice 1 : "+S.steps[0].t);
}

let tick=null;
function startTick(){ stopTick(); tick=setInterval(onTick,200); }
function stopTick(){ if(tick){ clearInterval(tick); tick=null; } }

function onTick(){
  if(!S.running) return;
  const left = S.endAt - Date.now();
  if(S.phase==="prep"){ S.prepMs=left; if(left<=0){ beginRun(); return; } }
  else { S.remMs=left; if(left<=0){ nextPhase(true); return; } }
  paintTimer();
}

// Entre dans un EXERCICE : d'abord un court temps de lecture (prep), puis ses phases
function enterStep(i){
  stopModel(); stopHold();
  S.idx=i; S.tr=0; S.phases=buildPhases(S.steps[i]); S.pidx=0;
  S.phase="prep"; S.prepMs=S.prepSecs*1000; S.remMs=S.phases[0].sec*1000;
  if(S.running) S.endAt=Date.now()+S.prepMs;
  paintStep(); paintPhase(); paintTimer(); paintPlay(); paintControls();
  announce("Exercice "+(i+1)+" : "+S.steps[i].t);
}
function beginRun(){ enterPhase(0); } // fin du temps de lecture → 1re phase
// Entre dans une PHASE (écoute / à toi / fais) et déclenche son audio
function enterPhase(j){
  stopModel(); stopHold();
  S.pidx=j; S.phase="run";
  const ph=S.phases[j];
  S.remMs=ph.sec*1000;
  if(S.running) S.endAt=Date.now()+S.remMs;
  phaseCue(ph.mode);
  if(ph.mode==="listen"){ playPhaseModel(ph.play); }
  else if(ph.mode==="sing"){
    if(ph.sustain){ startHold((ph.note||48)+S.tr, ph.sec); }
    else if(ph.ref){ setTimeout(()=>{ if(S.running&&S.phase==="run"&&S.pidx===j) playNoteRef((ph.note||48)+S.tr); }, 150); }
  }
  paintPhase(); paintTimer(); paintPlay(); paintControls();
  announce(phaseAnnounce(ph));
}
function startNow(){ // sauter l'attente de lecture
  if(!S.running){ S.running=true; startTick(); lockScreen(); }
  beginRun();
}
function onCentral(){ if(S.phase==="prep") startNow(); else togglePause(); }

function nextPhase(auto){
  if(S.pidx < S.phases.length-1){ enterPhase(S.pidx+1); }
  else { nextStep(auto); }
}
function nextStep(auto){
  if(S.idx >= S.steps.length-1){ endSession(); return; }
  if(auto) beepNext();
  enterStep(S.idx+1);
}
// navigation manuelle
function navNext(){ if(S.phase==="prep"){ beginRun(); return; } nextPhase(false); }
function navPrev(){
  if(S.phase==="run" && S.pidx>0){ enterPhase(S.pidx-1); return; }
  enterStep(Math.max(0,S.idx-1));
}

function togglePause(){
  S.running=!S.running;
  const key = S.phase==="prep" ? "prepMs" : "remMs";
  if(S.running){ S.endAt=Date.now()+S[key]; startTick(); lockScreen(); }
  else { S[key]=Math.max(0,S.endAt-Date.now()); stopTick(); stopModel(); stopHold(); }
  paintPlay(); paintPhase();
}
function addTime(sec){ S.remMs+=sec*1000; if(S.running && S.phase==="run") S.endAt=Date.now()+S.remMs; paintTimer(); }

function endSession(){
  stopTick(); stopModel(); stopHold(); unlockScreen(); chimeEnd();
  S.running=false; S.screen="end";
  S.form={ sssss:(S.logs[0]?S.logs[0].sssss:20), sens:4, note:"" };
  renderEnd();
}

    </div>

    <ul class="cues" id="cues"></ul>

function buildSegs(){
  const segs=document.getElementById("segs"); if(!segs) return;

function paintStep(){
  const step=S.steps[S.idx];

  title.textContent=step.t;
  document.getElementById("cues").innerHTML=step.c.map(x=>`<li>${esc(x)}</li>`).join("");

  document.querySelectorAll(".seg").forEach(el=>{
    const i=+el.dataset.i; el.classList.remove("done","cur"); el.style.removeProperty("--p");

const MODES={
  listen:{txt:"🔊 ÉCOUTE LE MODÈLE", col:"#7FB2F0"},
  sing:{txt:"🎶 À TOI · reproduis",  col:"#5fd08a"},
  do:{txt:"▶ FAIS L’EXERCICE",       col:"var(--accent)"},
};
function curPhase(){ return S.phases[S.pidx]||{mode:"do",sec:1,label:""}; }
function phaseRootMidi(){
  const ph=curPhase();
  const r=(ph.note!=null)?ph.note:(ph.play&&ph.play.root!=null?ph.play.root:(ph.play&&ph.play.gliss?ph.play.gliss[0]:48));
  return r+(S.tr||0);
}
function paintTimer(){
  const t=document.getElementById("time"); if(!t) return;
  const arc=document.getElementById("arc");
  if(S.phase==="prep"){
    const total=Math.max(1,S.prepSecs*1000);
    const frac=Math.max(0,Math.min(1,S.prepMs/total));
    t.textContent=String(Math.max(0,Math.ceil(S.prepMs/1000)));
    if(arc) arc.style.strokeDashoffset=(CIRC*(1-frac)).toFixed(1);
  }else{
    t.textContent=fmt(S.remMs);
    const total=Math.max(1,curPhase().sec*1000);
    const frac=Math.max(0,Math.min(1,S.remMs/total));
    if(arc) arc.style.strokeDashoffset=(CIRC*(1-frac)).toFixed(1);
    // progression de l'exercice (toutes phases) sur le segment courant
    const exTot=S.phases.reduce((a,p)=>a+p.sec,0)||1;
    let done=0; for(let j=0;j<S.pidx;j++) done+=S.phases[j].sec;
    const exFrac=(done + curPhase().sec*(1-frac))/exTot;
    const cur=document.querySelector(".seg.cur");
    if(cur) cur.style.setProperty("--p",(100*exFrac).toFixed(1)+"%");
  }
  const tot=document.getElementById("tot"); if(tot) tot.textContent=fmt(sessTotalMs());
}
function paintPhase(){
  const prep=S.phase==="prep";
  const ring=document.querySelector(".ring");
  const ph=curPhase();
  const meta=MODES[ph.mode]||MODES.do;
  const col=prep?"var(--muted)":meta.col;
  if(ring){ ring.classList.toggle("prep",prep); ring.classList.toggle("paused",!S.running); ring.style.setProperty("--pc",col); }
  const cnt=document.getElementById("cnt");
  if(cnt) cnt.textContent="EXERCICE "+(S.idx+1)+" / "+S.steps.length;
  const banner=document.getElementById("phaseBanner");
  if(banner){
    if(prep){ banner.textContent="PRÉPARE-TOI"; banner.style.color="var(--muted)"; banner.style.borderColor="var(--border)"; }
    else { banner.textContent=meta.txt; banner.style.color=meta.col; banner.style.borderColor=meta.col; }
  }
  const instr=document.getElementById("phaseInstr");
  if(instr) instr.textContent = prep ? "Lis l’exercice — départ auto, ou ▶ pour démarrer" : (ph.label||"");
  // pendant la lecture (prep) : montrer les repères ; pendant une phase : les masquer
  const cues=document.getElementById("cues"), tip=document.getElementById("tip");
  if(cues) cues.style.display=prep?"block":"none";
  if(tip) tip.style.display=(prep&&S.steps[S.idx].tip)?"block":"none";
}
function paintControls(){
  const bar=document.getElementById("phaseCtrl"); if(!bar) return;
  const ph=curPhase();
  const hasModel = S.phase==="run" && ph.play && (ph.play.pat||ph.play.note!=null||ph.play.gliss);
  bar.style.display = hasModel ? "flex" : "none";

function replayPhase(){ const ph=curPhase(); if(ph.play) playPhaseModel(ph.play); }
function shiftPhase(d){ S.tr=Math.max(-12,Math.min(24,(S.tr||0)+d)); paintControls(); if(T.drone.on){ T.drone.semi=phaseRootMidi()-57; droneSetFreq(); updateDroneUI(); } }
function toggleExerciseDrone(){
  audio();
  if(T.drone.on){ T.drone.on=false; T.drone.follow=false; droneStop(); }

function paintPlay(){

/* =========================================================
   ÉCRAN — PROGRÈS
   ========================================================= */
function streak(){
  const days=[...new Set(S.logs.map(l=>l.date))].sort().reverse(); // récent -> ancien
  if(!days.length) return 0;
  const today=new Date(todayKey());
  if(Math.round((today-new Date(days[0]))/86400000)>1) return 0; // dernière séance ni aujourd'hui ni hier
  let st=1, prev=new Date(days[0]);
  for(let i=1;i<days.length;i++){
    const cur=new Date(days[i]);
    if(Math.round((prev-cur)/86400000)===1){ st++; prev=cur; } else break;
  }
  return st;
}

function lineChart(values, color, target){
  if(values.length<2) return `<div class="empty">Fais au moins 2 séances enregistrées pour voir ta courbe.</div>`;
  const W=300,H=120,pad=14;
  const scaleVals = target!=null ? values.concat([target]) : values;
  const max=Math.max(...scaleVals), min=Math.min(...scaleVals);
  const span=(max-min)||1;
  const n=values.length;
  const X=i=> pad + i*( (W-2*pad)/(n-1) );
  const Y=v=> H-pad - ((v-min)/span)*(H-2*pad);
  let d=""; values.forEach((v,i)=>{ d+=(i?"L":"M")+X(i).toFixed(1)+" "+Y(v).toFixed(1)+" "; });
  const area=d+`L ${X(n-1).toFixed(1)} ${H-pad} L ${X(0).toFixed(1)} ${H-pad} Z`;
  const dots=values.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3" fill="${color}"/>`).join("");
  const tline = target!=null ? `<line x1="${pad}" y1="${Y(target).toFixed(1)}" x2="${W-pad}" y2="${Y(target).toFixed(1)}" stroke="${color}" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.5"/><text x="${W-pad}" y="${(Y(target)-5).toFixed(1)}" fill="${color}" font-size="10" text-anchor="end" font-family="ui-monospace,monospace" opacity="0.85">objectif ${target}s</text>` : "";
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img">
    <path d="${area}" fill="${color}" opacity="0.12"/>
    ${tline}
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    <text x="${pad}" y="12" fill="var(--muted-2)" font-size="10" font-family="ui-monospace,monospace">${max}</text>
    <text x="${pad}" y="${H-3}" fill="var(--muted-2)" font-size="10" font-family="ui-monospace,monospace">${min}</text>
  </svg>`;
}

    else if(cele.goal) celeText=`🎯 Objectif souffle atteint : ${cele.value} s !`;
  }

  app.className="fade";
  app.innerHTML=`
    <div class="topbar">

      <span style="width:64px"></span>
    </div>

    ${celeText?`<div class="celebrate">${celeText}</div>`:""}

    <div class="stat-row">
      <div class="stat"><div class="v">${total}</div><div class="k">séances</div></div>
      <div class="stat"><div class="v">${st}🔥</div><div class="k">jours d’affilée</div></div>
      <div class="stat"><div class="v">${bestSS}s</div><div class="k">meilleur souffle</div></div>
    </div>

    <div class="card chart-card">
      <h3>Souffle — durée du « sssss » (s)</h3>
      ${lineChart(ssVals,"var(--accent)",S.goal)}
      <div class="goal-row">
        <span>🎯 Objectif souffle</span>
        <div class="goal-ctrl">
          <button id="goalDown" aria-label="Baisser l’objectif">–</button>
          <span id="goalVal">${S.goal} s</span>
          <button id="goalUp" aria-label="Augmenter l’objectif">+</button>
        </div>
      </div>
    </div>
    <div class="card chart-card">
      <h3>Sensation /5</h3>
      ${lineChart(senVals,"#8FD0C4")}
    </div>

    <div class="card">
      <h3 style="font-size:.82rem;color:var(--muted);font-weight:600;margin:0 0 6px">Historique</h3>
      ${total?`<ul class="hist">${hist}</ul>`:`<div class="empty">Aucune séance enregistrée pour l’instant.<br>Termine une séance et note ton « sssss ».</div>`}
    </div>

    <div class="spacer"></div>
    <button class="cta" id="home">Retour à l’accueil</button>
  `;
  app.querySelector("#back").onclick=()=>renderHome();
  app.querySelector("#home").onclick=()=>renderHome();
  app.querySelector("#goalDown").onclick=()=>{ S.goal=Math.max(10,S.goal-1); savePrefs(); renderProgress(); };
  app.querySelector("#goalUp").onclick=()=>{ S.goal=Math.min(120,S.goal+1); savePrefs(); renderProgress(); };
  if(cele){ celebrateBurst(); celebrateSound(); }
}

/* =========================================================
   OUTILS — drone (note de référence), métronome, micro
   ========================================================= */
const T = {
  built:false, open:false,
  drone:{on:false, semi:0, follow:false, osc:null, osc2:null, gain:null, vol:0.42},
  metro:{on:false, bpm:80, beat:0, timer:null, nextTime:0},
};
const A3=220; // La3 = base du drone
const NOTE_FR=["Do","Do♯","Ré","Ré♯","Mi","Fa","Fa♯","Sol","Sol♯","La","La♯","Si"];
function freqToNote(f){
  const midi=69+12*Math.log2(f/440);
  const near=Math.round(midi);
  const cents=Math.round((midi-near)*100);
  const pc=((near%12)+12)%12;
  return {name:NOTE_FR[pc], octave:Math.floor(near/12)-1, cents};
}
function midiName(m){ const n=freqToNote(midiToFreq(m)); return n.name+n.octave; }
function refreshToolsTriggers(){
  const on=T.drone.on||T.metro.on;
  document.querySelectorAll(".tools-trigger").forEach(b=>b.classList.toggle("on",on));
}

/* ---- panneau ---- */
function ensureTools(){
  if(T.built) return;
  const back=document.createElement("div"); back.className="tools-backdrop"; back.id="toolsBack";
  const panel=document.createElement("div"); panel.className="tools-panel"; panel.id="toolsPanel";
  panel.innerHTML=`
    <div class="tools-head"><h2>Outils</h2><button class="tools-x" id="toolsClose" aria-label="Fermer">✕</button></div>
    ${droneBlockHTML()}
    ${metroBlockHTML()}
  `;
  document.body.appendChild(back); document.body.appendChild(panel);
  back.onclick=closeTools;
  panel.querySelector("#toolsClose").onclick=closeTools;
  wireDrone();
  wireMetro();
  T.built=true;
}
function openTools(){
  audio(); ensureTools(); T.open=true;
  const b=document.getElementById("toolsBack"), p=document.getElementById("toolsPanel");
  requestAnimationFrame(()=>{ b.classList.add("open"); p.classList.add("open"); });
}
function closeTools(){
  T.open=false;
  const b=document.getElementById("toolsBack"), p=document.getElementById("toolsPanel");
  if(b) b.classList.remove("open"); if(p) p.classList.remove("open");
}

/* ---- DRONE ---- */
function droneFreq(){ return A3*Math.pow(2,T.drone.semi/12); }
function droneBlockHTML(){ return `
  <div class="tool" id="toolDrone">
    <div class="tool-head">
      <div class="tool-name"><span class="em">🎵</span> Note de référence</div>
      <button class="sw" id="droneSw" role="switch" aria-label="Activer le bourdon"></button>
    </div>
    <div class="tool-body">
      <div class="row-ctrl">
        <button class="rbtn" id="droneDown" aria-label="Plus grave">–</button>
        <div class="rval"><span id="droneNote">La3</span><small>bourdon à tenir / chanter par-dessus</small></div>
        <button class="rbtn" id="droneUp" aria-label="Plus aiguë">+</button>
      </div>
      <div class="vol-row">
        <span class="vol-ic">🔉</span>
        <input type="range" id="droneVol" min="0" max="100" value="42" aria-label="Volume du bourdon">
        <span class="vol-ic">🔊</span>
      </div>
    </div>
  </div>`; }
function wireDrone(){
  const p=document.getElementById("toolsPanel");
  p.querySelector("#droneSw").onclick=toggleDrone;
  p.querySelector("#droneDown").onclick=()=>{ T.drone.semi=Math.max(-24,T.drone.semi-1); T.drone.follow=false; droneSetFreq(); updateDroneUI(); };
  p.querySelector("#droneUp").onclick=()=>{ T.drone.semi=Math.min(24,T.drone.semi+1); T.drone.follow=false; droneSetFreq(); updateDroneUI(); };
  const vol=p.querySelector("#droneVol");
  if(vol) vol.oninput=()=>{ T.drone.vol=vol.value/100; if(T.drone.gain){ const c=audio(); T.drone.gain.gain.setTargetAtTime(T.drone.vol, c.currentTime, .03); } };
  updateDroneUI();
}
function updateDroneUI(){
  const n=freqToNote(droneFreq());
  const el=document.getElementById("droneNote");
  if(el) el.textContent=n.name+n.octave+" · "+Math.round(droneFreq())+" Hz";
  const sw=document.getElementById("droneSw");
  if(sw){ sw.classList.toggle("on",T.drone.on); sw.setAttribute("aria-checked",T.drone.on); }
}
function toggleDrone(){
  audio();
  T.drone.on=!T.drone.on;
  if(T.drone.on){ droneStart(); } else { droneStop(); T.drone.follow=false; }
  updateDroneUI(); refreshToolsTriggers();
}
function droneStart(){
  const c=audio(); if(!c) return;
  const f=droneFreq();
  T.drone.gain=c.createGain(); T.drone.gain.gain.value=0; T.drone.gain.connect(c.destination);
  T.drone.osc=c.createOscillator(); T.drone.osc.type="triangle"; T.drone.osc.frequency.value=f;
  T.drone.osc2=c.createOscillator(); T.drone.osc2.type="sine"; T.drone.osc2.frequency.value=f; T.drone.osc2.detune.value=-3;
  const g2=c.createGain(); g2.gain.value=.55;
  T.drone.osc.connect(T.drone.gain); T.drone.osc2.connect(g2); g2.connect(T.drone.gain);
  T.drone.osc.start(); T.drone.osc2.start();
  T.drone.gain.gain.linearRampToValueAtTime(T.drone.vol, c.currentTime+.08);
}
function droneStop(){
  const c=audio(); if(!T.drone.gain){ return; }
  const g=T.drone.gain, o1=T.drone.osc, o2=T.drone.osc2;
  try{
    g.gain.cancelScheduledValues(c.currentTime);
    g.gain.setValueAtTime(g.gain.value,c.currentTime);
    g.gain.linearRampToValueAtTime(0,c.currentTime+.08);
  }catch(e){}
  setTimeout(()=>{ try{o1.stop();o2.stop();}catch(e){} }, 160);
  T.drone.osc=T.drone.osc2=T.drone.gain=null;
}
function droneSetFreq(){
  if(!T.drone.osc) return;
  const c=audio(), f=droneFreq();
  T.drone.osc.frequency.setValueAtTime(f,c.currentTime);
  T.drone.osc2.frequency.setValueAtTime(f,c.currentTime);
}

/* ---- MÉTRONOME ---- */
function metroBlockHTML(){ return `
  <div class="tool" id="toolMetro">
    <div class="tool-head">

        <button class="rbtn" id="metroDown" aria-label="Moins vite">–</button>
        <div class="rval"><span id="metroBpm">80</span><small>BPM · mesure à 4 temps</small></div>
        <button class="rbtn" id="metroUp" aria-label="Plus vite">+</button>
        <button class="tap" id="metroTap">Tap</button>
      </div>

let tapTimes=[];
function wireMetro(){
  const p=document.getElementById("toolsPanel");
  p.querySelector("#metroSw").onclick=toggleMetro;
  p.querySelector("#metroDown").onclick=()=>{ T.metro.bpm=Math.max(40,T.metro.bpm-1); updateMetroUI(); };
  p.querySelector("#metroUp").onclick=()=>{ T.metro.bpm=Math.min(240,T.metro.bpm+1); updateMetroUI(); };
  p.querySelector("#metroTap").onclick=tapTempo;
  updateMetroUI();
}
function updateMetroUI(){
  const el=document.getElementById("metroBpm"); if(el) el.textContent=T.metro.bpm;
  const sw=document.getElementById("metroSw");
  if(sw){ sw.classList.toggle("on",T.metro.on); sw.setAttribute("aria-checked",T.metro.on); }
}
function toggleMetro(){
  audio();
  T.metro.on=!T.metro.on;
  if(T.metro.on) metroStart(); else metroStop();
  updateMetroUI(); refreshToolsTriggers();
}
function metroStart(){
  const c=audio(); if(!c) return;
  T.metro.beat=0; T.metro.nextTime=c.currentTime+0.08;
  T.metro.timer=setInterval(metroSched,25);
}
function metroStop(){
  if(T.metro.timer){ clearInterval(T.metro.timer); T.metro.timer=null; }
  document.querySelectorAll(".beat").forEach(b=>b.classList.remove("hit"));
}
function metroSched(){
  const c=audio(); if(!c) return;
  const spb=60/T.metro.bpm;
  while(T.metro.nextTime < c.currentTime+0.12){
    const idx=T.metro.beat%4, accent=idx===0;
    clickAt(T.metro.nextTime, accent);
    flashBeat(T.metro.nextTime, idx);
    T.metro.beat++; T.metro.nextTime += spb;
  }
}
function clickAt(t, accent){
  const c=audio(); if(!c) return;
  const o=c.createOscillator(), g=c.createGain();
  o.type="square"; o.frequency.value=accent?1700:1150;
  o.connect(g); g.connect(c.destination);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(accent?.26:.16,t+.004);
  g.gain.exponentialRampToValueAtTime(.0001,t+.05);
  o.start(t); o.stop(t+.06);
}
function flashBeat(t, idx){
  const delay=Math.max(0,(t-audio().currentTime)*1000);
  setTimeout(()=>{
    const beats=document.querySelectorAll(".beat");
    const el=beats[idx]; if(!el) return;
    el.classList.add("hit");
    setTimeout(()=>el.classList.remove("hit"),90);
  }, delay);
}
function tapTempo(){
  audio();
  const now=performance.now();
  tapTimes=tapTimes.filter(t=>now-t<2200); tapTimes.push(now);
  if(tapTimes.length>=2){
    let sum=0; for(let i=1;i<tapTimes.length;i++) sum+=tapTimes[i]-tapTimes[i-1];
    const avg=sum/(tapTimes.length-1);
    let bpm=Math.round(60000/avg);
    T.metro.bpm=Math.max(40,Math.min(240,bpm));
    updateMetroUI();
  }
}

/* =========================================================
   MODÈLE JOUÉ (play-along) — piano + sirène de référence
   ========================================================= */
function midiToFreq(m){ return 440*Math.pow(2,(m-69)/12); }
const PATTERNS={
  arpUp:[0,4,7,12],
  arpUpDown:[0,4,7,12,7,4,0],
  scale5:[0,2,4,5,7,5,4,2,0],
  scaleOct:[0,2,4,5,7,9,11,12,11,9,7,5,4,2,0],
};
// ---- SYSTÈME DE PHASES : appel-réponse (écoute → à toi) + sous-étapes ----
function patDur(patName, tempo, art){
  if(art==="sustain") return 2.6;
  const pat=PATTERNS[patName]||[0]; const beat=60/(tempo||90);
  return pat.length*beat + .3;
}
// motif mélodique : rounds × (écoute le piano → à toi de reproduire), +1 demi-ton par round
function crMel(patName, root, rounds, opt={}){
  const tempo=opt.tempo||90, art=opt.art||"legato", d=patDur(patName,tempo,art);
  const sl=opt.singLabel||"Reproduis exactement ce que tu viens d’entendre", ph=[];
  for(let i=0;i<rounds;i++){
    const r=root+i;
    ph.push({mode:"listen", sec:Math.max(4,Math.ceil(d+1.3)), play:{pat:patName,root:r,tempo,art}, note:r, label:"Le piano joue le modèle — écoute bien"});
    ph.push({mode:"sing",   sec:Math.ceil(d+2),               play:{pat:patName,root:r,tempo,art}, note:r, ref:true, label:sl});
  }
  return ph;
}
// note tenue : rounds × (écoute la note → tiens-la), +1 demi-ton par round
function crSus(root, rounds, opt={}){
  const hold=opt.holdSec||8, sl=opt.singLabel||"Tiens la note, stable et soutenue", ph=[];
  for(let i=0;i<rounds;i++){
    const r=root+i;
    ph.push({mode:"listen", sec:4,    play:{note:r,art:"sustain"}, note:r, label:opt.listenLabel||"Écoute la note de référence"});
    ph.push({mode:"sing",   sec:hold, play:{note:r,art:"sustain"}, note:r, ref:true, sustain:true, label:sl});
  }
  return ph;
}
function doP(label, sec){ return {mode:"do", sec, label}; }
function glissP(lo, hi, label){ return {mode:"listen", sec:5, play:{gliss:[lo,hi]}, note:lo, label:label||"Écoute la sirène (le mouvement à reproduire)"}; }

// modèles par titre d'étape (root MIDI ; Do3=48). Ténor : on peut transposer largement à l'écran.
const SPEC={
  "Attaques équilibrées": crSus(48,5,{holdSec:6, listenLabel:"Écoute la note", singLabel:"Attaque nette sur « é » — ni soufflé, ni coup de glotte"}),
  "Justesse — note tenue (drone)": crSus(48,5,{holdSec:9, singLabel:"Tiens la note, parfaitement stable (le bourdon t’aide)"}),
  "Justesse — gamme 5 notes": crMel("scale5",48,6,{tempo:88, singLabel:"Reproduis la gamme, bien juste"}),
  "Justesse — intervalles": crMel("arpUpDown",48,5,{tempo:90, singLabel:"Reproduis l’arpège, chaque note juste"}),
  "Résonance — ng → a": crSus(50,5,{holdSec:8, listenLabel:"Écoute la note", singLabel:"« ng » puis ouvre sur « a » en gardant le buzz à l’avant"}),
  "Résonance — nay nay nay": crMel("arpUp",50,5,{tempo:100, singLabel:"« nay nay nay » brillant — cherche le ring qui coupe"}),
  "Passaggio — goug / mum": crMel("arpUpDown",50,6,{tempo:92, singLabel:"« goug » sur l’arpège, connecté, sans craquer"}),
  "Agilité — gammes rapides": crMel("scaleOct",48,5,{tempo:138, singLabel:"Reproduis la gamme rapide — légère et précise"}),
  "Agilité — staccato": crMel("arpUpDown",48,5,{tempo:120, art:"staccato", singLabel:"Notes piquées, nettes et légères"}),
  "Nuances — messa di voce": crSus(50,4,{holdSec:14, singLabel:"Crescendo doux→fort puis decrescendo — hauteur stable"}),
  "SOVT — sirènes larges": [glissP(43,60), doP("Sirènes (paille / lip trills) — traverse TOUT ton registre, passe la rupture sans t’arrêter",235)],
  "Passaggio — sirènes ng": [glissP(48,60), doP("Sirènes sur « ng » à travers le break, lentement, sans craquer",115)],
  "SOVT — paille": [glissP(45,57), doP("Paille dans l’eau, glissandos doux. Rien d’autre — pas d’aigu, pas de fort",235)],
  "Lip trills doux": [doP("Lip trills « brrr » en glissando, très doux, sur toute l’étendue",180)],
  "Sirènes légères": [glissP(45,57), doP("Sirènes douces sur « ng », sans forcer — laisse revenir l’émission",175)],
};
function buildPhases(step){
  if(Array.isArray(step.ph) && step.ph.length) return step.ph.map(p=>({...p}));
  if(SPEC[step.t]) return SPEC[step.t].map(p=>({...p}));
  return [{mode:"do", sec:step.s, label:(step.c||[]).join(" · ")||step.t}];
}
function exDurMs(step){ return buildPhases(step).reduce((a,p)=>a+p.sec*1000,0); }
let modelNodes=[], modelPlayTO=null;
function pianoNote(freq,t,len){
  const c=audio();
  const g=c.createGain(); g.connect(c.destination);
  const oscs=[[1,.5,"triangle"],[2,.16,"sine"],[3,.07,"sine"]].map(([mu,a,tp])=>{
    const o=c.createOscillator(); o.type=tp; o.frequency.value=freq*mu;
    const og=c.createGain(); og.gain.value=a; o.connect(og); og.connect(g);
    o.start(t); o.stop(t+len+.05); return o;
  });
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(.3,t+.012);
  g.gain.exponentialRampToValueAtTime(.0001,t+len);
  modelNodes.push({oscs,g});
}
function glissModel(loM,hiM){
  const c=audio(); const lo=midiToFreq(loM), hi=midiToFreq(hiM);
  const g=c.createGain(); g.connect(c.destination);
  const o=c.createOscillator(); o.type="triangle"; o.connect(g);
  const t=c.currentTime+.05, half=1.4;
  o.frequency.setValueAtTime(lo,t);
  o.frequency.exponentialRampToValueAtTime(hi,t+half);
  o.frequency.exponentialRampToValueAtTime(lo,t+2*half);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(.16,t+.12);
  g.gain.setValueAtTime(.16,t+2*half-.15);
  g.gain.linearRampToValueAtTime(0,t+2*half);
  o.start(t); o.stop(t+2*half+.05);
  modelNodes.push({oscs:[o],g});
}
function playPhaseModel(play){
  audio(); stopModel();
  if(!play) return;
  const tr=S.tr||0;
  if(play.gliss){ glissModel(play.gliss[0]+tr, play.gliss[1]+tr); markPlaying(2.9); return; }
  if(play.note!=null && play.art==="sustain"){ pianoNote(midiToFreq(play.note+tr), audio().currentTime+.05, 1.6); markPlaying(1.7); return; }
  const seq=PATTERNS[play.pat]||[0];
  const root=(play.root!=null?play.root:48)+tr, tempo=play.tempo||90, beat=60/tempo, art=play.art||"legato";
  const len=(art==="staccato")?Math.min(.16,beat*.45):beat*.92;
  const c=audio(); let t=c.currentTime+.06;
  seq.forEach(s=>{ pianoNote(midiToFreq(root+s),t,len); t+=beat; });
  markPlaying(seq.length*beat+.3);
}
function playNoteRef(midi){ audio(); stopModel(); pianoNote(midiToFreq(midi), audio().currentTime+.04, 1.3); markPlaying(1.4); }
let holdNodes=null;
function startHold(midi, durSec){
  stopHold(); const c=audio(); if(!c||S.muted) return;
  const g=c.createGain(); g.gain.value=0; g.connect(c.destination);
  const o=c.createOscillator(); o.type="triangle"; o.frequency.value=midiToFreq(midi);
  const o2=c.createOscillator(); o2.type="sine"; o2.frequency.value=midiToFreq(midi); o2.detune.value=-3;
  const g2=c.createGain(); g2.gain.value=.5; o.connect(g); o2.connect(g2); g2.connect(g);
  const t=c.currentTime;
  g.gain.linearRampToValueAtTime(.16,t+.08);
  g.gain.setValueAtTime(.16,t+Math.max(.3,durSec-.25));
  g.gain.linearRampToValueAtTime(0,t+durSec);
  o.start(t); o2.start(t); o.stop(t+durSec+.05); o2.stop(t+durSec+.05);
  holdNodes={o,o2,g};
}
function stopHold(){
  if(!holdNodes) return; const c=audio();
  try{ holdNodes.g.gain.cancelScheduledValues(c.currentTime); holdNodes.g.gain.setValueAtTime(0,c.currentTime); holdNodes.o.stop(); holdNodes.o2.stop(); }catch(e){}
  holdNodes=null;
}
function phaseCue(mode){
  if(S.muted) return;
  if(mode==="listen"){ tone(523.25,0,.14,.18); }
  else if(mode==="sing"){ tone(784,0,.12,.2); tone(1046.5,.1,.16,.18); }
  else { tone(660,0,.16,.2); }
}
function phaseAnnounce(ph){
  if(ph.mode==="listen") return "Écoute le modèle";
  if(ph.mode==="sing") return "À toi : "+(ph.label||"reproduis");
  return ph.label||"Exercice";
}
function stopModel(){
  const c=audio();
  modelNodes.forEach(n=>{
    try{ n.g.gain.cancelScheduledValues(c.currentTime); n.g.gain.setValueAtTime(0,c.currentTime); }catch(e){}
    n.oscs.forEach(o=>{ try{o.stop();}catch(e){} });
  });
  modelNodes=[];
  if(modelPlayTO){ clearTimeout(modelPlayTO); modelPlayTO=null; }
  const b=document.getElementById("phaseReplay"); if(b) b.classList.remove("playing");
}
function markPlaying(dur){
  const b=document.getElementById("phaseReplay"); if(b) b.classList.add("playing");
  if(modelPlayTO) clearTimeout(modelPlayTO);
  modelPlayTO=setTimeout(()=>{ const x=document.getElementById("phaseReplay"); if(x) x.classList.remove("playing"); }, (dur||3)*1000);
}

    c.appendChild(s);
  }
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),2300);
}
function celebrateSound(){
  if(S.muted) return;
  tone(659.25,0,.3,.2); tone(783.99,.1,.3,.2); tone(987.77,.2,.35,.22); tone(1318.5,.32,.45,.22);
}

/* =========================================================
   PERSISTANCE position + prefs
   ========================================================= */
async function savePos(){ await Store.setJSON(K_PREFS,{muted:S.muted,week:S.week,day:S.day,prepSecs:S.prepSecs,goal:S.goal}); }
async function savePrefs(){ await Store.setJSON(K_PREFS,{muted:S.muted,week:S.week,day:S.day,prepSecs:S.prepSecs,goal:S.goal}); }

/* =========================================================
   BOOT
   ========================================================= */
(async function init(){
  const prefs=await Store.getJSON(K_PREFS,{});
  if(prefs && typeof prefs==="object"){
    if(typeof prefs.muted==="boolean") S.muted=prefs.muted;
    if(prefs.week>=1&&prefs.week<=3) S.week=prefs.week;
    if(prefs.day>=1&&prefs.day<=7) S.day=prefs.day;
    if([3,5,8].includes(prefs.prepSecs)) S.prepSecs=prefs.prepSecs;
    if(prefs.goal>=10&&prefs.goal<=120) S.goal=prefs.goal;
  }
  S.logs=await Store.getJSON(K_LOGS,[]) || [];
  renderHome();
})();
</script>
